<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fruit slayyers</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="game-container">
    <div id="scoreboard"></div>
    <canvas id="gameCanvas"></canvas>
    <div class="video-box" id="video-slot-0" style="bottom: 25px; right: 25px; border-color: #ff9f00; display: none;">
        <video id="video-0" autoplay playsinline></video>
        <div class="video-label" id="label-0">Slot 0</div>
    </div>
    <div class="video-box" id="video-slot-1" style="bottom: 25px; left: 25px; border-color: #00ffff; display: none;">
        <video id="video-1" autoplay playsinline></video>
        <div class="video-label" id="label-1">Slot 1</div>
    </div>
    <div class="video-box" id="video-slot-2" style="top: 25px; left: 25px; border-color: #ff00ff; display: none;">
        <video id="video-2" autoplay playsinline></video>
        <div class="video-label" id="label-2">Slot 2</div>
    </div>
    <div class="video-box" id="video-slot-3" style="top: 25px; right: 25px; border-color: #00ff00; display: none;">
        <video id="video-3" autoplay playsinline></video>
        <div class="video-label" id="label-3">Slot 3</div>
    </div>
        <div id="setup-overlay">
        <div class="setup-card">
            <h2>Fruit Slayyers</h2>
            <p id="setup-status">Configuring hand tracking and secure P2P stream...</p>
            <div id="share-link-section" style="display: none;">
                <p style="color: #888; font-size: 9px; line-height: 1.6;">Share this link with your friend to peer:</p>
                <input type="text" id="share-url" readonly>
                <br>
                <button onclick="copyShareUrl()">Copy Link</button>
            </div>
        </div>
    </div>
    <div id="winner-overlay" style="display:none;">
        <div class="setup-card">
            <h2 id="winner-text">PLAYER WINS!</h2>
            <p id="winner-status"></p>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>
</div>

</body>

<script src="script.js"></script>
</html>
